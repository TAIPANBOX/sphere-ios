name: Sphere
options:
  bundleIdPrefix: app.sphere
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

knownRegions:
  - en

packages:
  SphereCore:
    path: SphereCore
  # MLX LLM libraries for the downloaded-model backend (AI Tier 1). App target
  # ONLY — never the widget/watch extensions (loading weights there would hit
  # the memory jetsam limit). Runs on device GPUs; the simulator can build but
  # not run MLX, which LocalModelAI guards with !targetEnvironment(simulator).
  MLXExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: 2.21.0

targets:
  Sphere:
    type: application
    platform: iOS
    sources:
      - Sphere/Sources
    dependencies:
      - package: SphereCore
        product: SphereCore
      - package: SphereCore
        product: SphereUI
      - package: MLXExamples
        product: MLXLLM
      - package: MLXExamples
        product: MLXLMCommon
      - target: SphereWidgetExtension
      - target: SphereWatch
        embed: true
    info:
      path: Sphere/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        CFBundleLocalizations:
          - en
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: >-
          Sphere uses your location to show local weather on the Home tab.
        NSHealthShareUsageDescription: >-
          Sphere reads your steps, heart rate, sleep, energy, HRV, and cycle from
          Apple Health so your Health agent can work with real data.
        NSHealthUpdateUsageDescription: >-
          Sphere can save the weight, water, workouts, and mindful minutes you
          log back to Apple Health, so your data stays in one place.
        NSContactsUsageDescription: >-
          Sphere can import names and birthdays from your contacts to set up
          your Relationships sphere. Nothing is shared or uploaded.
        NSCalendarsFullAccessUsageDescription: >-
          Sphere reads today's events to show your agenda and give your morning
          brief context. Nothing is shared or uploaded.
        NSPhotoLibraryUsageDescription: >-
          Attach photos to your agent conversations.
        NSMicrophoneUsageDescription: >-
          Dictate messages to your agents by voice.
        NSSpeechRecognitionUsageDescription: >-
          Transcribe your voice into chat messages, on-device where possible.
        NSFaceIDUsageDescription: >-
          Unlock Sphere with Face ID so your health, finance, and journal
          data stays private.
    entitlements:
      path: Sphere/Sphere.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - SphereWidget
      # Shared verbatim with the app target: Button(intent:) requires the
      # intent type compiled into this target too. Only needs AppIntents +
      # SphereCore + WidgetKit, so it carries no app-only dependencies.
      - path: Sphere/Sources/QuickLogIntents.swift
    dependencies:
      - package: SphereCore
        product: SphereCore
    info:
      path: SphereWidget/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: SphereWidget/SphereWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.Widget
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Watch
      # Shared verbatim with the watch widget extension: the watch app drains
      # the queued logs this intent writes, and its App Shortcuts / Action
      # Button entry point (WatchShortcuts) references the intent type.
      - path: WatchWidget/WatchQuickLogIntent.swift
    dependencies:
      - package: SphereCore
        product: SphereCore
      - target: SphereWatchWidgetExtension
        embed: true
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        WKApplication: true
        WKCompanionAppBundleIdentifier: app.sphere.Sphere
        NSLocationWhenInUseUsageDescription: Sphere shows your local weather.
    entitlements:
      path: Watch/SphereWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.watch
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - WatchWidget
    dependencies:
      - package: SphereCore
        product: SphereCore
    info:
      path: WatchWidget/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WatchWidget/SphereWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.watch.widget
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  Sphere:
    build:
      targets:
        Sphere: all
    run:
      config: Debug
