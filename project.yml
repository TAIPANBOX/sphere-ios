name: Sphere
options:
  bundleIdPrefix: app.sphere
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  SphereCore:
    path: SphereCore

targets:
  Sphere:
    type: application
    platform: iOS
    sources:
      - Sphere/Sources
    dependencies:
      - package: SphereCore
        product: SphereCore
      - package: SphereCore
        product: SphereUI
      - target: SphereWidgetExtension
      - target: SphereWatch
        embed: true
    info:
      path: Sphere/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: >-
          Sphere uses your location to show local weather on the Home tab.
        NSHealthShareUsageDescription: >-
          Sphere reads your steps, heart rate, sleep, energy, and HRV from
          Apple Health so your Health agent can work with real data.
        NSHealthUpdateUsageDescription: >-
          Sphere does not write health data; this is required by HealthKit.
        NSPhotoLibraryUsageDescription: >-
          Attach photos to your agent conversations.
    entitlements:
      path: Sphere/Sphere.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - SphereWidget
    dependencies:
      - package: SphereCore
        product: SphereCore
    info:
      path: SphereWidget/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: SphereWidget/SphereWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.Widget
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - Watch
    dependencies:
      - package: SphereCore
        product: SphereCore
      - target: SphereWatchWidgetExtension
        embed: true
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        WKApplication: true
        WKCompanionAppBundleIdentifier: app.sphere.Sphere
        NSLocationWhenInUseUsageDescription: Sphere shows your local weather.
    entitlements:
      path: Watch/SphereWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.watch
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

  SphereWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - WatchWidget
    dependencies:
      - package: SphereCore
        product: SphereCore
    info:
      path: WatchWidget/Info.plist
      properties:
        CFBundleDisplayName: Sphere
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WatchWidget/SphereWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.sphere.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sphere.Sphere.watch.widget
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  Sphere:
    build:
      targets:
        Sphere: all
    run:
      config: Debug
