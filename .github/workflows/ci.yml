name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: swift test (SphereCore)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        # Newest installed Xcode: the codebase uses current-SDK APIs and the
        # app job already builds with the runner default. (The old 16.2 pin
        # predates them and its Swift rejects newer constructs.)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Build
        working-directory: SphereCore
        run: swift build
      - name: Test
        working-directory: SphereCore
        run: swift test

  app:
    name: xcodebuild (Sphere app, iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # No xcode-select here: the runner's default Xcode ships with a
      # matching iOS Simulator runtime; hand-picked versions may not.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Ensure Metal toolchain
        # MLX compiles Metal shaders; Xcode 26 ships the Metal toolchain as a
        # separate component that runner images may lack. No-op when present.
        run: xcodebuild -downloadComponent MetalToolchain || true
      - name: Generate project
        run: xcodegen generate
      - name: Build app
        # No -sdk override: it would force the embedded watchOS targets to
        # build against the iOS SDK. -destination lets each target use its
        # own platform SDK.
        run: >
          xcodebuild -project Sphere.xcodeproj -scheme Sphere
          -destination 'generic/platform=iOS Simulator'
          build CODE_SIGNING_ALLOWED=NO
